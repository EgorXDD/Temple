  <p class="intro">
    龍德宮 為澎湖白沙地區重要宗教信仰場所，承載地方居民的共同信仰與歷史記憶。
    廟內匾額內容多與神德、護境、海疆庇佑相關，呈現地方宗教文化與海洋生活密切結合的特色。
  </p>
