  <p class="intro">澎湖縣白沙鄉講美村8鄰81號</p>
  <p class="intro">講美村龍德宮是白沙鄉重要的地方信仰中心，歷史悠久，香火鼎盛。廟宇主要祭祀龍德聖帝，信眾藉由參拜表達敬仰與感謝，祈求神明護佑國家平安、地方安寧及居民生活順利。廟宇不僅是宗教活動場所，也承載社區文化、民間信仰與歷史傳承的重要角色。</p>
