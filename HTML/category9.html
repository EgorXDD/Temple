  <h1>文衡聖帝廟</h1>
  <p class="intro">884澎湖縣白沙鄉12 鄰 183 號</p>
  <p class="intro">
    文衡聖帝廟 為澎湖地區重要的關聖帝君信仰場所，主祀關羽，承載地方居民對忠義精神與道德價值的信仰寄託。
    廟內匾額多以忠義、聖德、護佑為核心內容，反映關聖信仰與地方文化長期結合的歷史特色。<br>
    主祀神：關羽（關聖帝君）
  </p>
