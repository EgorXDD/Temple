  <h1>明新宮</h1>
  <p class="intro">(廟宇地址)</p>
  <p class="intro">明新宮是澎湖白沙鄉的重要地方信仰中心，歷史悠久，香火鼎盛。廟宇主要祭祀聖德長昭聖帝（或具體神明名稱可依實際補充），信眾藉由參拜，表達敬仰與感謝，祈求神明護佑地方平安、海疆安穩及居民生活順利。廟宇不僅是宗教場所，也是地方文化、社區凝聚與歷史傳承的重要象徵。</p>
